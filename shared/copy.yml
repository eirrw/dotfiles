- name: "link file"
  ansible.builtin.file:
    state: link
    src: "{{ src }}"
    dest: "{{ dest }}"
  when: inventory_hostname == 'localhost' and items is not defined

- name: "copy file"
  ansible.builtin.copy:
    src: "{{ src }}"
    dest: "{{ dest }}"
    mode: preserve
  when: inventory_hostname != 'localhost' and items is not defined

- name: "link files"
  ansible.builtin.file:
    state: link
    src: "{{ src }}"
    dest: "{{ dest }}"
  loop: "{{ items }}"
  when: inventory_hostname == 'localhost' and items is defined
  loop_control:
    label: "{{ item.path if item is mapping else item }}"

- name: "copy files"
  ansible.builtin.copy:
    src: "{{ src }}"
    dest: "{{ dest }}"
    mode: preserve
  loop: "{{ items }}"
  when: inventory_hostname != 'localhost' and items is defined
  loop_control:
    label: "{{ item.path if item is mapping else item }}"
